<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamentos</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tabulator/6.2.1/css/tabulator.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tabulator/6.2.1/js/tabulator.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/agenda.css') }}">

</head>

<body>
    <h1 id="title_page">Agendamentos</h1>

    {% if erro %}
    
    <div class="alert alert-danger">
    
        {{ erro }}
    
    </div>



    {% else %}
    
    <input type="text" id="busca" placeholder="Buscar paciente, CPF ou médico">
    
    <div id="agenda-table"> </div>

    <script>
           const agendamentos = {{ agendamentos | tojson }};
    </script>

    {% endif %}


  <script src="{{ url_for('static', filename='scripts/agenda.js') }}"></script>
</body>
</html>
